services:
  gauthcraft: 
    build: 
      context: . 
    ports: 
      - "50051:50051" 
    env_file: 
      - ./config/.env 
    depends_on: 
      - jenkins 

  jenkins: 
    image: jenkins/jenkins:lts 
    container_name: jenkins 
    ports: 
      - "8080:8080" 
      - "50000:50000" 
    volumes: 
      - jenkins_home:/var/jenkins_home 

volumes:
  jenkins_home: