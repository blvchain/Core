syntax = "proto3";

package gate;

option go_package = "blvchain/core/protos";

// Block
message BlockMeta {
    string PreBlockHash = 1;
    string NodeUID = 2;
    int64 TimeStamp = 3;
}
message Contract {
    string Name = 1;
    string Version = 2;
    string Language = 3;
    string Compiler = 4;
    string Description = 5;
    string Checksum = 6;
    string Author = 7;
    string License = 8;
}

message BlockData {
    string SenderUID = 1;
    int64  SenderRole = 2;
    string SenderPubKey = 3;
    string Signature = 4;
    string ReceiverUID = 5;
    int64  ReceiverRole = 6;
    string Data = 7;
    bytes  ContractBase64 = 8;
    string UseContract = 9;
    Contract ContractData = 10;
    int64  TimeStamp = 11;
}
message Block {
    string    BlockHash = 1;
    BlockMeta BlockMeta = 2;
    BlockData BlockData = 3;
}


// Add data
service AddData {
    rpc addData (BlockData) returns (AddDataResult);
}


message AddDataResult {
    bool   IsSuccess = 1;
    string Log = 2;
    string BlockHash = 3;
}

// Read data
service ReadData {
    rpc readData (ReadDataRequest) returns (ReadDataResult);
}

message ReadDataRequest {
    int64  Limit = 1;
    int64  Skip = 2;
    string SenderUID = 3;
    int64  SenderRole = 4;
    string SenderPubKey = 5;
    string ReceiverUID = 6;
    int64  ReceiverRole = 7;
    string BlockHash = 8;
    string PreBlockHash = 9;
    string NodeUID = 10;
    int64  TimeStampFrom = 11;
    int64  TimeStampTo = 12;
    string UseContract = 13;
    string UID = 14;
}

message ReadDataResult {
    bool           IsSuccess = 1;
    string         Log = 2;
    repeated Block Data = 3;
}

