syntax = "proto3";

package gate;

option go_package = "blvchain/core/protos";

// Block
message BlockMeta {
    string PreBlockHash = 1;
    string NodeUID = 2;
    int64 TimeStamp = 3;
}
message BlockData {
    string SenderUID = 1;
    int64 SenderRole = 2;
    string SenderPubKey = 3;
    string Signature = 4;
    string ReceiverUID = 5;
    int64 ReceiverRole = 6;
    string Data = 7;
    int64 TimeStamp = 8;
}
message Block {
    string BlockHash = 1;
    BlockMeta BlockMeta = 2;
    BlockData BlockData = 3;
}


// Add data
service AddData {
    rpc addData (BlockData) returns (AddDataResult);
}


message AddDataResult {
    bool IsSuccess = 1;
    string Log = 2;
}

// Read data
service ReadData {
    rpc readData (ReadDataRequest) returns (ReadDataResult);
}

message ReadDataRequest {
    string senderUID = 1;
    int64 senderRole = 2;
    string receiverUID = 3;
    int64 receiverRole = 4;
    string blockHash = 5;
    string preBlockHash = 6;
    int64 timeStampFrom = 7;
    int64 timeStampTo = 8;
    int64 Limit = 9;
    int64 Skip = 10;
}

message ReadDataResult {
    bool IsSuccess = 1;
    string Log = 2;
    repeated Block Data = 3;
}

